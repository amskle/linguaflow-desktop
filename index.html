<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<title>LinguaFlow 翻译</title>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
	<style>
		/* ========== 基础重置与变量 ========== */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		:root {
			--bg: #09090b;
			--bg-card: #131316;
			--bg-input: #18181b;
			--bg-hover: #1e1e22;
			--accent: #f59e0b;
			--accent-dim: #b45309;
			--accent-glow: rgba(245, 158, 11, 0.10);
			--accent-glow-strong: rgba(245, 158, 11, 0.25);
			--fg: #fafafa;
			--fg-secondary: #a1a1aa;
			--fg-muted: #52525b;
			--border: #27272a;
			--border-light: #3f3f46;
			--success: #22c55e;
			--error: #ef4444;
			--radius: 10px;
			--radius-sm: 6px;
		}

		body {
			width: 400px;
			min-height: 480px;
			max-height: 580px;
			font-family: 'Space Grotesk', system-ui, sans-serif;
			background: var(--bg);
			color: var(--fg);
			overflow: hidden;
			position: relative;
		}

		/* 背景微光效果 */
		body::before {
			content: '';
			position: absolute;
			top: -60px;
			left: 50%;
			transform: translateX(-50%);
			width: 300px;
			height: 200px;
			background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
			pointer-events: none;
			z-index: 0;
		}

		/* ========== 主容器 ========== */
		.app {
			position: relative;
			z-index: 1;
			display: flex;
			flex-direction: column;
			height: 100%;
			max-height: 580px;
		}

		/* ========== 标题栏 ========== */
		.header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 14px 18px 10px;
			border-bottom: 1px solid var(--border);
		}

		.brand {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.brand-icon {
			width: 26px;
			height: 26px;
			background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
			border-radius: 7px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 13px;
			color: #000;
			font-weight: 700;
		}

		.brand-name {
			font-size: 16px;
			font-weight: 600;
			letter-spacing: -0.3px;
		}

		.brand-name span {
			color: var(--accent);
		}

		.header-actions {
			display: flex;
			gap: 4px;
		}

		.icon-btn {
			width: 32px;
			height: 32px;
			border: none;
			background: transparent;
			color: var(--fg-muted);
			border-radius: var(--radius-sm);
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 14px;
			transition: all 0.2s;
		}

		.icon-btn:hover {
			background: var(--bg-hover);
			color: var(--fg-secondary);
		}

		.icon-btn.active {
			color: var(--accent);
			background: var(--accent-glow);
		}

		/* ========== 语言选择栏 ========== */
		.lang-bar {
			display: flex;
			align-items: center;
			gap: 6px;
			padding: 10px 18px;
		}

		.lang-select {
			flex: 1;
			position: relative;
		}

		.lang-select select {
			width: 100%;
			appearance: none;
			background: var(--bg-input);
			border: 1px solid var(--border);
			border-radius: var(--radius-sm);
			color: var(--fg);
			font-family: inherit;
			font-size: 13px;
			font-weight: 500;
			padding: 8px 30px 8px 12px;
			cursor: pointer;
			transition: all 0.2s;
			outline: none;
		}

		.lang-select select:hover {
			border-color: var(--border-light);
		}

		.lang-select select:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 2px var(--accent-glow);
		}

		.lang-select::after {
			content: '\f078';
			font-family: 'Font Awesome 6 Free';
			font-weight: 900;
			font-size: 9px;
			position: absolute;
			right: 10px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--fg-muted);
			pointer-events: none;
		}

		.swap-btn {
			width: 34px;
			height: 34px;
			border: 1px solid var(--border);
			background: var(--bg-input);
			color: var(--accent);
			border-radius: 50%;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 12px;
			transition: all 0.3s;
			flex-shrink: 0;
		}

		.swap-btn:hover {
			background: var(--accent-glow);
			border-color: var(--accent);
			transform: rotate(180deg);
		}

		/* ========== 输入区域 ========== */
		.input-section {
			padding: 0 18px;
			position: relative;
		}

		.input-wrapper {
			position: relative;
			background: var(--bg-input);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			transition: all 0.2s;
		}

		.input-wrapper:focus-within {
			border-color: var(--accent);
			box-shadow: 0 0 0 2px var(--accent-glow);
		}

		.input-wrapper textarea {
			width: 100%;
			min-height: 90px;
			max-height: 120px;
			background: transparent;
			border: none;
			color: var(--fg);
			font-family: inherit;
			font-size: 14px;
			line-height: 1.6;
			padding: 12px 14px;
			resize: none;
			outline: none;
		}

		.input-wrapper textarea::placeholder {
			color: var(--fg-muted);
		}

		.input-toolbar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 6px 10px;
			border-top: 1px solid var(--border);
		}

		.char-count {
			font-size: 11px;
			color: var(--fg-muted);
			font-weight: 400;
		}

		.char-count.warning {
			color: var(--error);
		}

		.input-actions {
			display: flex;
			gap: 2px;
		}

		.input-actions .icon-btn {
			width: 28px;
			height: 28px;
			font-size: 12px;
		}

		/* ========== 翻译按钮 ========== */
		.translate-btn {
			margin: 10px 18px;
			padding: 10px;
			background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
			border: none;
			border-radius: var(--radius);
			color: #000;
			font-family: inherit;
			font-size: 14px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.25s;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			position: relative;
			overflow: hidden;
		}

		.translate-btn::before {
			content: '';
			position: absolute;
			inset: 0;
			background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.15) 50%, transparent 100%);
			transform: translateX(-100%);
			transition: transform 0.5s;
		}

		.translate-btn:hover::before {
			transform: translateX(100%);
		}

		.translate-btn:hover {
			box-shadow: 0 4px 20px var(--accent-glow-strong);
			transform: translateY(-1px);
		}

		.translate-btn:active {
			transform: translateY(0);
		}

		.translate-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
			transform: none;
		}

		.translate-btn .spinner {
			width: 16px;
			height: 16px;
			border: 2px solid rgba(0, 0, 0, 0.2);
			border-top-color: #000;
			border-radius: 50%;
			animation: spin 0.6s linear infinite;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		/* ========== 结果区域 ========== */
		.result-section {
			padding: 0 18px;
			flex: 1;
			min-height: 0;
		}

		.result-wrapper {
			background: var(--bg-card);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			min-height: 90px;
			max-height: 160px;
			overflow-y: auto;
			position: relative;
		}

		.result-wrapper::-webkit-scrollbar {
			width: 4px;
		}

		.result-wrapper::-webkit-scrollbar-track {
			background: transparent;
		}

		.result-wrapper::-webkit-scrollbar-thumb {
			background: var(--border-light);
			border-radius: 4px;
		}

		.result-content {
			padding: 12px 14px;
			font-size: 14px;
			line-height: 1.7;
			color: var(--fg);
			white-space: pre-wrap;
			word-break: break-word;
			min-height: 60px;
		}

		.result-placeholder {
			color: var(--fg-muted);
			font-style: italic;
		}

		.result-toolbar {
			display: flex;
			align-items: center;
			justify-content: flex-end;
			padding: 6px 10px;
			border-top: 1px solid var(--border);
			gap: 2px;
		}

		.detected-lang {
			font-size: 11px;
			color: var(--accent);
			margin-right: auto;
			font-weight: 500;
		}

		/* ========== 历史面板 ========== */
		.history-panel {
			position: absolute;
			inset: 0;
			z-index: 10;
			background: var(--bg);
			transform: translateX(100%);
			transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
			display: flex;
			flex-direction: column;
		}

		.history-panel.open {
			transform: translateX(0);
		}

		.history-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 14px 18px;
			border-bottom: 1px solid var(--border);
		}

		.history-header h3 {
			font-size: 15px;
			font-weight: 600;
		}

		.history-list {
			flex: 1;
			overflow-y: auto;
			padding: 8px;
		}

		.history-list::-webkit-scrollbar {
			width: 4px;
		}

		.history-list::-webkit-scrollbar-thumb {
			background: var(--border-light);
			border-radius: 4px;
		}

		.history-item {
			padding: 10px 12px;
			border-radius: var(--radius-sm);
			cursor: pointer;
			transition: all 0.15s;
			border: 1px solid transparent;
			position: relative;
		}

		.history-item:hover {
			background: var(--bg-hover);
			border-color: var(--border);
		}

		.history-item-source {
			font-size: 12px;
			color: var(--fg-secondary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-bottom: 3px;
		}

		.history-item-target {
			font-size: 13px;
			color: var(--fg);
			font-weight: 500;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.history-item-lang {
			font-size: 10px;
			color: var(--fg-muted);
			margin-top: 4px;
		}

		.history-item-delete {
			position: absolute;
			top: 8px;
			right: 8px;
			width: 22px;
			height: 22px;
			border: none;
			background: transparent;
			color: var(--fg-muted);
			cursor: pointer;
			border-radius: 4px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 10px;
			opacity: 0;
			transition: all 0.15s;
		}

		.history-item:hover .history-item-delete {
			opacity: 1;
		}

		.history-item-delete:hover {
			background: rgba(239, 68, 68, 0.15);
			color: var(--error);
		}

		.history-empty {
			text-align: center;
			padding: 40px 20px;
			color: var(--fg-muted);
			font-size: 13px;
		}

		.history-empty i {
			font-size: 28px;
			display: block;
			margin-bottom: 10px;
			opacity: 0.3;
		}

		/* ========== Toast 提示 ========== */
		.toast {
			position: fixed;
			bottom: 20px;
			left: 50%;
			transform: translateX(-50%) translateY(60px);
			background: var(--bg-card);
			border: 1px solid var(--border);
			color: var(--fg);
			padding: 8px 16px;
			border-radius: 20px;
			font-size: 12px;
			font-weight: 500;
			z-index: 100;
			opacity: 0;
			transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
			pointer-events: none;
			display: flex;
			align-items: center;
			gap: 6px;
			white-space: nowrap;
		}

		.toast.show {
			opacity: 1;
			transform: translateX(-50%) translateY(0);
		}

		.toast i {
			font-size: 12px;
		}

		.toast.success i {
			color: var(--success);
		}

		.toast.error i {
			color: var(--error);
		}

		/* ========== 分隔装饰线 ========== */
		.divider {
			height: 1px;
			margin: 0 18px;
			background: linear-gradient(90deg, transparent 0%, var(--accent-glow-strong) 50%, transparent 100%);
		}

		/* ========== 滚动条全局 ========== */
		textarea::-webkit-scrollbar {
			width: 4px;
		}

		textarea::-webkit-scrollbar-thumb {
			background: var(--border-light);
			border-radius: 4px;
		}

		/* ========== 动画 ========== */
		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(6px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.result-content.translated {
			animation: fadeIn 0.3s ease;
		}

		/* ========== 减弱动画偏好 ========== */
		@media (prefers-reduced-motion: reduce) {

			*,
			*::before,
			*::after {
				animation-duration: 0.01ms !important;
				transition-duration: 0.01ms !important;
			}
		}
	</style>
</head>

<body>
	<div class="app">
		<!-- 标题栏 -->
		<header class="header">
			<div class="brand">
				<div class="brand-icon"><i class="fa-solid fa-language"></i></div>
				<div class="brand-name">Lingua<span>Flow</span></div>
			</div>
			<div class="header-actions">
				<button class="icon-btn" id="historyBtn" title="翻译历史" aria-label="翻译历史">
					<i class="fa-solid fa-clock-rotate-left"></i>
				</button>
				<button class="icon-btn" id="clearBtn" title="清空输入" aria-label="清空输入">
					<i class="fa-solid fa-eraser"></i>
				</button>
			</div>
		</header>
		<!-- 语言选择栏 -->
		<div class="lang-bar">
			<div class="lang-select">
				<select id="sourceLang" aria-label="源语言"></select>
			</div>
			<button class="swap-btn" id="swapBtn" title="交换语言" aria-label="交换语言">
				<i class="fa-solid fa-right-left"></i>
			</button>
			<div class="lang-select">
				<select id="targetLang" aria-label="目标语言"></select>
			</div>
		</div>
		<!-- 输入区域 -->
		<section class="input-section">
			<div class="input-wrapper">
				<textarea id="sourceText" placeholder="输入要翻译的文本..." rows="3" aria-label="源文本"></textarea>
				<div class="input-toolbar">
					<span class="char-count" id="charCount">0 / 500</span>
					<div class="input-actions">
						<button class="icon-btn" id="pasteBtn" title="粘贴" aria-label="粘贴">
							<i class="fa-solid fa-paste"></i>
						</button>
					</div>
				</div>
			</div>
		</section>
		<!-- 翻译按钮 -->
		<button class="translate-btn" id="translateBtn">
			<i class="fa-solid fa-arrows-rotate"></i>
			<span>翻译</span>
		</button>
		<!-- 分隔线 -->
		<div class="divider"></div>
		<!-- 结果区域 -->
		<section class="result-section">
			<div class="result-wrapper">
				<div class="result-content" id="resultContent">
					<span class="result-placeholder">翻译结果将在此显示</span>
				</div>
				<div class="result-toolbar">
					<span class="detected-lang" id="detectedLang"></span>
					<button class="icon-btn" id="copyBtn" title="复制结果" aria-label="复制结果">
						<i class="fa-regular fa-copy"></i>
					</button>
					<button class="icon-btn" id="speakBtn" title="朗读结果" aria-label="朗读结果">
						<i class="fa-solid fa-volume-high"></i>
					</button>
				</div>
			</div>
		</section>
		<!-- 历史面板 -->
		<div class="history-panel" id="historyPanel">
			<div class="history-header">
				<h3><i class="fa-solid fa-clock-rotate-left"
						style="color:var(--accent);margin-right:8px;font-size:13px;"></i>翻译历史</h3>
				<div style="display:flex;gap:4px;">
					<button class="icon-btn" id="clearHistoryBtn" title="清空历史" aria-label="清空历史">
						<i class="fa-solid fa-trash-can"></i>
					</button>
					<button class="icon-btn" id="closeHistoryBtn" title="关闭" aria-label="关闭">
						<i class="fa-solid fa-xmark"></i>
					</button>
				</div>
			</div>
			<div class="history-list" id="historyList"></div>
		</div>
	</div>
	<!-- Toast 提示 -->
	<div class="toast" id="toast"></div>
	<div class="history-panel" id="historyPanel">
	</div>
	</div>
	<div class="toast" id="toast"></div>

	<script src="popup.js"></script>

</body>

</html>
</body>

</html>
